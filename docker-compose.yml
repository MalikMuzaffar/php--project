version: '3.8'

services:
  website: 
    build: .
    ports: 
      - 8080:80
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: onlineshop
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - ./database/onlineshop.sql:/docker-entrypoint-initdb.d/onlineshop.sql
