name: Professional DevOps CI/CD
on:
  push:
    branches: [ "master" ]
  #pull_request:
    #branches: [ "master" ]

jobs:
  # STAGE 1: Code Quality & Testing
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: onlineshop
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli, pdo, pdo_mysql
          tools: phpunit:10.5
steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: PHP Syntax Check (Linting)
        run: find . -name "*.php" -exec php -l {} \;

      # ADD THIS: waits for MySQL to be ready before running tests
      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 --silent && break
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done

      # CHANGED: added env block so tests connect to 127.0.0.1 instead of 'db'
      - name: Run Unit Tests
        env:
          DB_SERVER: 127.0.0.1
          DB_USERNAME: root
          DB_PASSWORD: ""
          DB_DATABASE: onlineshop
        run: phpunit tests/DatabaseTest.php

  # STAGE 2: Build and Push
  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/online-shop:latest

  # STAGE 3: Deploy
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    #if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
	run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem

          # Copy database
          scp -o StrictHostKeyChecking=no -i key.pem ./database ubuntu@$SERVER_IP:/home/ubuntu/online-shop/database
        
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.SERVER_USER }}/online-shop
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/online-shop:latest
            docker compose up -d
            docker image prune -f
