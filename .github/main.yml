name: Professional DevOps CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # STAGE 1: Code Quality & Testing
  test-and-lint:
    runs-on: ubuntu-latest
    # Add this services section:
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: onlineshop
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli, pdo, pdo_mysql
          tools: phpunit

      - name: PHP Syntax Check (Linting)
        run: find . -name "*.php" -exec php -l {} \;

      - name: Run Unit Tests
        run: phpunit tests/DatabaseTest.php

  # STAGE 2: Build and Security Scan (Optional but good for DevOps)
  build-and-push:
    needs: test-and-lint # Only runs if Stage 1 passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/online-shop:latest

  ## STAGE 3: Continuous Deployment (CD)
  #deploy:
    #needs: build-and-push
    #runs-on: ubuntu-latest
    #if: github.ref == 'refs/heads/main'
    #steps:
      #- name: Deploy to Server via SSH
        #RUN: ssh -i 
        ## You would use an SSH action here to pull the new image on your server
        #run: echo "Deploying to production server..."
        
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only deploy if the changes were merged into the main branch
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Navigate to your project directory
            cd /home/${{ secrets.SERVER_USER }}/online-shop
            
            # 2. Login to Docker Hub on the server (to pull private images)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 3. Pull the latest image you just built
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/online-shop:latest
            
            # 4. Restart the containers with the new image
            # This assumes you are using docker-compose
            docker-compose up -d
            
            # 5. Optional: Clean up old, unused images to save disk space
            docker image prune -f
