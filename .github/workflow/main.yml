name: Professional DevOps CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # STAGE 1: Code Quality & Testing
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli, pdo, pdo_mysql
          tools: phpunit

      - name: PHP Syntax Check (Linting)
        run: find . -name "*.php" -exec php -l {} \;

      - name: Run Unit Tests
        run: phpunit tests/DatabaseTest.php

  # STAGE 2: Build and Security Scan (Optional but good for DevOps)
  build-and-push:
    needs: test-and-lint # Only runs if Stage 1 passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/online-shop:latest

  # STAGE 3: Continuous Deployment (CD)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Server via SSH
        # You would use an SSH action here to pull the new image on your server
        run: echo "Deploying to production server..."
